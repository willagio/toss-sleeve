name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        run: uv python install 3.13
      - name: Sync deps
        run: uv sync --dev
      - name: Ruff
        run: uv run ruff check src/ tests/
      - name: Mypy
        run: uv run mypy src/
      - name: Pytest
        run: uv run pytest -q
